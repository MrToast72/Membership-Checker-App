name: Build And Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pyinstaller

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Build Windows executable
        run: |
          pyinstaller --noconsole --windowed --onefile --name MembershipVerifier --clean -y --icon assets/app_icon.ico --add-data "assets;assets" app.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MembershipVerifier-windows
          path: dist/MembershipVerifier.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pyinstaller

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Build Linux executable
        run: |
          pyinstaller --noconsole --onefile --name MembershipVerifier-linux --clean -y --add-data "assets:assets" app.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: MembershipVerifier-linux
          path: dist/MembershipVerifier-linux
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pyinstaller

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Build macOS app
        run: |
          pyinstaller --noconsole --windowed --name MembershipVerifier --clean -y --add-data "assets:assets" app.py
          hdiutil create -volname "MembershipVerifier" -srcfolder "dist/MembershipVerifier.app" -ov -format UDZO "dist/MembershipVerifier.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MembershipVerifier-macos
          path: |
            dist/MembershipVerifier.app
            dist/MembershipVerifier.dmg
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MembershipVerifier-windows
          path: release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: MembershipVerifier-linux
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: MembershipVerifier-macos
          path: release-assets

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum MembershipVerifier.exe > MembershipVerifier.exe.sha256
          sha256sum MembershipVerifier-linux > MembershipVerifier-linux.sha256
          sha256sum MembershipVerifier.dmg > MembershipVerifier.dmg.sha256
          cat MembershipVerifier.exe.sha256 MembershipVerifier-linux.sha256 MembershipVerifier.dmg.sha256 > SHA256SUMS.txt

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/MembershipVerifier.exe
            release-assets/MembershipVerifier-linux
            release-assets/MembershipVerifier.dmg
            release-assets/MembershipVerifier.exe.sha256
            release-assets/MembershipVerifier-linux.sha256
            release-assets/MembershipVerifier.dmg.sha256
            release-assets/SHA256SUMS.txt
