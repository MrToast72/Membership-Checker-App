services:
  member:
    image: ghcr.io/mrtoast72/membership-checker-app:v1.0.0
    container_name: member-webapp
    restart: unless-stopped
    environment:
      MEMBER_HOST: 0.0.0.0
      MEMBER_PORT: 8000
      MEMBER_DB_PATH: /data/members.sqlite3
      # Optional app-layer auth fallback if you want it in addition to Traefik middleware.
      MEMBER_BASIC_AUTH_USER: ${MEMBER_BASIC_AUTH_USER:-}
      MEMBER_BASIC_AUTH_PASS: ${MEMBER_BASIC_AUTH_PASS:-}
    volumes:
      - member-data:/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.member-web.rule=Host(`member.cyberconnectit.com`)"
      - "traefik.http.routers.member-web.entrypoints=websecure"
      - "traefik.http.routers.member-web.tls.certresolver=cloudflare"
      - "traefik.http.routers.member-web.middlewares=member-auth"
      - "traefik.http.middlewares.member-auth.basicauth.users=${TRAEFIK_BASIC_AUTH_USERS:-changeMe:$$2y$$05$$changeMeChangeMeChangeMeChangeMeChangeMeChangeMeChangeMe}"
      - "traefik.http.services.member-web.loadbalancer.server.port=8000"
      - "traefik.http.services.member-web.loadbalancer.server.scheme=http"

volumes:
  member-data:

networks:
  traefik:
    external: true
